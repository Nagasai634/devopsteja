name: Build and Deploy Spring Boot to EKS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3️⃣ Make Gradle wrapper executable
      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      # 4️⃣ Build Gradle project
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5️⃣ Set dynamic image tag based on commit SHA
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 6️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 7️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REPOSITORY

      # 8️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t springboot-app .

      # 9️⃣ Tag Docker image
      - name: Tag Docker image
        run: |
          docker tag springboot-app:latest $ECR_REPOSITORY:$IMAGE_TAG
          docker tag springboot-app:latest $ECR_REPOSITORY:latest

      # 🔟 Push Docker image to ECR
      - name: Push Docker image
        run: |
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest

      # 1️⃣1️⃣ Update kubeconfig for EKS
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name ${{ secrets.EKS_CLUSTER_NAME }}

      # 1️⃣2️⃣ Deploy to EKS using kubectl set image (dynamic)
      - name: Deploy to EKS
        run: |
          # Apply service and deployment from k8s/ folder
          kubectl apply -f k8s/deployement.yml
          kubectl apply -f k8s/service.yml
          kubectl set image deployment/springboot-app \
            springboot-app=$ECR_REPOSITORY:$IMAGE_TAG